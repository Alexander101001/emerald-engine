version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: emerald-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5

  emerald-brain:
    build: .
    container_name: emerald-brain
    env_file:
      - .env
    environment:
      - OLLAMA_ENDPOINT=http://ollama:11434
      - PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  ollama_data:
