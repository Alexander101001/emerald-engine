version: "3.9"

services:
  emerald-vault-sentinel:
    build:
      context: .
      dockerfile: Dockerfile.sentinel
    image: emerald-vault-sentinel:latest
    container_name: emerald-vault-sentinel
    restart: always
    networks:
      - emerald-internal
    ports:
      - "8443:8443"
    environment:
      - EMERALD_MASTER_SECURE_KEY=${EMERALD_MASTER_SECURE_KEY:?err}
      - SENTINEL_AUTH_TOKEN=${SENTINEL_AUTH_TOKEN:-}
      - SENTINEL_PORT=8443
      - ENCRYPTED_CONFIG_PATH=/etc/sentinel/config.encrypted
      - VAULT_BACKUP_PATH=/var/lib/sentinel/backup
    volumes:
      - sentinel-data:/var/lib/sentinel
      - sentinel-config:/etc/sentinel
      - encrypted-data:/data/encrypted:ro
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.20"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8443/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  emerald-engine:
    build:
      context: .
      dockerfile: Dockerfile
    image: emerald-engine:latest
    container_name: emerald-engine
    restart: always
    depends_on:
      emerald-vault-sentinel:
        condition: service_healthy
    networks:
      - emerald-internal
    ports:
      - "7860:7860"
    environment:
      - EMERALD_MASTER_SECURE_KEY=${EMERALD_MASTER_SECURE_KEY:?err}
      - SENTINEL_URL=http://emerald-vault-sentinel:8443
      - SENTINEL_AUTH_TOKEN=${SENTINEL_AUTH_TOKEN:-}
      - PYTHONUNBUFFERED=1
      - OLLAMA_ENDPOINT=${OLLAMA_ENDPOINT:-http://host.docker.internal:11434}
      - HF_SPACE_URL=https://alexandergreater90-emerald-engine.hf.space
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_USER_ID=${TELEGRAM_USER_ID:-}
      - GITHUB_REMOTE=${GITHUB_REMOTE:-origin}
      - HACKER_BOT_INTERVAL=${HACKER_BOT_INTERVAL:-3600}
    volumes:
      - encrypted-data:/data/encrypted:ro
      - engine-data:/var/lib/emerald
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  emerald-research-stream:
    build:
      context: .
      dockerfile: Dockerfile.research
    image: emerald-research-stream:latest
    container_name: emerald-research-stream
    restart: always
    depends_on:
      - emerald-engine
    networks:
      - emerald-internal
    environment:
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=research_vectors
      - STREAM_WORKERS=4
      - ARXIV_QUERY=cat:cs.AI+OR+cat:cs.LG+OR+cat:cs.CL
      - ANTHROPIC_FEED=https://www.anthropic.com/research
      - OPENAI_BLOG=https://openai.com/index/
      - STREAM_OUTPUT_DIR=/data/research
      - PYTHONUNBUFFERED=1
    volumes:
      - research-data:/data/research
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.30"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: emerald-qdrant
    restart: always
    networks:
      - emerald-internal
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  emerald-internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  sentinel-data:
    driver: local
  sentinel-config:
    driver: local
  encrypted-data:
    driver: local
  engine-data:
    driver: local
  qdrant-data:
    driver: local
  research-data:
    driver: local
