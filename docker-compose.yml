version: "3.9"

services:
  emerald-ollama:
    image: ollama/ollama:latest
    container_name: emerald-ollama
    restart: always
    networks:
      - emerald_network
      - emerald-internal
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_KEEP_ALIVE=5m
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: "0.50"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  emerald-redis:
    image: redis:7-alpine
    container_name: emerald-redis
    restart: always
    networks:
      - emerald_network
      - emerald-internal
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.15"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  emerald-minio:
    image: minio/minio:latest
    container_name: emerald-minio
    restart: always
    networks:
      - emerald_network
      - emerald-internal
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-emerald}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-emerald_secret_key}
    command: server /data --console-address ":9001"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.20"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  emerald-traefik:
    image: traefik:v3.0
    container_name: emerald-traefik
    restart: always
    networks:
      - emerald_network
      - emerald-internal
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-config:/etc/traefik
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.15"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  emerald-vault-sentinel:
    build:
      context: .
      dockerfile: Dockerfile.sentinel
    image: emerald-vault-sentinel:latest
    container_name: emerald-vault-sentinel
    restart: always
    networks:
      - emerald_network
      - emerald-internal
    ports:
      - "8443:8443"
    environment:
      - EMERALD_MASTER_SECURE_KEY=${EMERALD_MASTER_SECURE_KEY:?err}
      - SENTINEL_AUTH_TOKEN=${SENTINEL_AUTH_TOKEN:-}
      - SENTINEL_PORT=8443
      - ENCRYPTED_CONFIG_PATH=/etc/sentinel/config.encrypted
      - VAULT_BACKUP_PATH=/var/lib/sentinel/backup
    volumes:
      - sentinel-data:/var/lib/sentinel
      - sentinel-config:/etc/sentinel
      - encrypted-data:/data/encrypted:ro
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.20"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8443/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  emerald-engine:
    build:
      context: .
      dockerfile: Dockerfile
    image: emerald-engine:latest
    container_name: emerald-engine
    restart: always
    depends_on:
      emerald-vault-sentinel:
        condition: service_healthy
    networks:
      - emerald_network
      - emerald-internal
    ports:
      - "7860:7860"
    environment:
      - EMERALD_MASTER_SECURE_KEY=${EMERALD_MASTER_SECURE_KEY:?err}
      - SENTINEL_URL=http://emerald-vault-sentinel:8443
      - SENTINEL_AUTH_TOKEN=${SENTINEL_AUTH_TOKEN:-}
      - PYTHONUNBUFFERED=1
      - OLLAMA_ENDPOINT=http://emerald-ollama:11434
      - HF_SPACE_URL=https://alexandergreater90-emerald-engine.hf.space
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_USER_ID=${TELEGRAM_USER_ID:-}
      - GITHUB_REMOTE=${GITHUB_REMOTE:-origin}
      - HACKER_BOT_INTERVAL=${HACKER_BOT_INTERVAL:-3600}
    volumes:
      - encrypted-data:/data/encrypted:ro
      - engine-data:/var/lib/emerald
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  emerald-research-stream:
    build:
      context: .
      dockerfile: Dockerfile.research
    image: emerald-research-stream:latest
    container_name: emerald-research-stream
    restart: always
    depends_on:
      - emerald-engine
    networks:
      - emerald_network
      - emerald-internal
    environment:
      - QDRANT_URL=http://emerald-qdrant:6333
      - QDRANT_COLLECTION=research_vectors
      - STREAM_WORKERS=4
      - ARXIV_QUERY=cat:cs.AI+OR+cat:cs.LG+OR+cat:cs.CL
      - ANTHROPIC_FEED=https://www.anthropic.com/research
      - OPENAI_BLOG=https://openai.com/index/
      - STREAM_OUTPUT_DIR=/data/research
      - PYTHONUNBUFFERED=1
    volumes:
      - research-data:/data/research
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.30"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: emerald-qdrant
    restart: always
    networks:
      - emerald_network
      - emerald-internal
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  emerald_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/16

  emerald-internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  sentinel-data:
    driver: local
  sentinel-config:
    driver: local
  encrypted-data:
    driver: local
  engine-data:
    driver: local
  qdrant-data:
    driver: local
  research-data:
    driver: local
  ollama-models:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local
  traefik-config:
    driver: local
