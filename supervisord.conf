[supervisord]
nodaemon=true
logfile=/data/logs/supervisord.log
pidfile=/tmp/supervisord.pid
user=root

[program:emerald-engine]
command=python app.py
directory=/app
stdout_logfile=/data/logs/engine.log
stderr_logfile=/data/logs/engine.err
autostart=true
autorestart=true
startretries=10
stopwaitsecs=10

[program:research-stream]
command=python infinite_research_stream.py
directory=/app
stdout_logfile=/data/logs/research.log
stderr_logfile=/data/logs/research.err
autostart=true
autorestart=true
startretries=10
stopwaitsecs=5

[program:self-evolution]
command=python self_evolution.py
directory=/app
stdout_logfile=/data/logs/evolution.log
stderr_logfile=/data/logs/evolution.err
autostart=true
autorestart=true
startretries=10
stopwaitsecs=5

[program:cloudflared]
command=bash /app/scripts/cloudflare_tunnel.sh
directory=/app
stdout_logfile=/data/logs/cloudflared.log
stderr_logfile=/data/logs/cloudflared.err
autostart=false
autorestart=true
startretries=5
stopwaitsecs=5
