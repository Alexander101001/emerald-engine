version: "3.9"

services:

  emerald-ollama:
    image: ollama/ollama:latest
    container_name: emerald-ollama
    restart: always
    networks:
      - emerald_network
    ports:
      - "11434:11434"
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  emerald-qdrant:
    image: qdrant/qdrant:latest
    container_name: emerald-qdrant
    restart: always
    networks:
      - emerald_network
    ports:
      - "6333:6333"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  emerald-redis:
    image: redis:7-alpine
    container_name: emerald-redis
    restart: unless-stopped
    networks:
      - emerald_network
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.15"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  emerald-minio:
    image: minio/minio:latest
    container_name: emerald-minio
    restart: always
    networks:
      - emerald_network
    ports:
      - "9000:9000"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.2"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  emerald-traefik:
    image: traefik:v3.0
    container_name: emerald-traefik
    restart: always
    networks:
      - emerald_network
    ports:
      - "80:80"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.15"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  emerald-docker-baseimage-alpine:
    image: lscr.io/linuxserver/baseimage-alpine:latest
    container_name: emerald-docker-baseimage-alpine
    restart: unless-stopped
    networks:
      - emerald_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  emerald-frp:
    image: fatedier/frps:latest
    container_name: emerald-frp
    restart: always
    networks:
      - emerald_network
    ports:
      - "7000:7000"
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.1"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  emerald_network:
    external: true
