name: Deploy Aladdin to Hugging Face Spaces
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  HF_SPACE: AlexanderGreater90/aladdin-system

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to Hugging Face Container Registry
        uses: docker/login-action@v3
        with:
          registry: hf-registry.registry.hf.space
          username: ${{ github.actor }}
          password: ${{ secrets.HF_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            hf-registry.registry.hf.space/${{ env.HF_SPACE }}:latest
            hf-registry.registry.hf.space/${{ env.HF_SPACE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Hugging Face Space rebuild
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          SPACE_ORG="${HF_SPACE%/*}"
          SPACE_NAME="${HF_SPACE#*/}"
          curl -s -X POST \
            "https://huggingface.co/api/spaces/$SPACE_ORG/$SPACE_NAME/restart" \
            -H "Authorization: Bearer $HF_TOKEN"
          echo "Deployment triggered"

  health-check:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Wait for Space to become RUNNING
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          SPACE_ORG="${HF_SPACE%/*}"
          SPACE_NAME="${HF_SPACE#*/}"
          for i in $(seq 1 30); do
            STATUS=$(curl -s "https://huggingface.co/api/spaces/$SPACE_ORG/$SPACE_NAME" \
              -H "Authorization: Bearer $HF_TOKEN" | \
              python3 -c "import sys,json; print(json.load(sys.stdin).get('runtime',{}).get('stage','unknown'))")
            echo "Attempt $i/30: status=$STATUS"
            [ "$STATUS" = "RUNNING" ] && echo "Aladdin is live" && exit 0
            sleep 20
          done
          echo "Timeout" && exit 1
