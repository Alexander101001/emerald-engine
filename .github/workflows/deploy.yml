name: Sync to Hugging Face Spaces + Module Deploy

on:
  push:
    branches: [main, emerald-state]
  workflow_dispatch:
    inputs:
      module:
        description: 'Module to deploy (core, logic, interface, all)'
        required: false
        default: 'core'
      skip_clone:
        description: 'Skip cloning, only generate compose'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  HF_SPACE: AlexanderGreater90/emerald-engine

jobs:
  obfuscation-scan:
    name: Obfuscation & Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run obfuscation scan
        run: |
          pip install cryptography -q
          python obfuscate_environment.py --dry-run
      - name: Check for secrets in code
        run: |
          ! grep -rE 'sk-[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{36}|hf_[a-zA-Z0-9]{36}' \
            --exclude-dir=.git --exclude-dir=node_modules --exclude='*.encrypted' \
            --exclude='.env*' . 2>/dev/null || \
            echo "::warning::Possible secrets found in code"

  build-sentinel:
    name: Build Vault Sentinel
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push sentinel
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.sentinel
          push: true
          tags: ghcr.io/${{ github.repository }}/sentinel:latest,ghcr.io/${{ github.repository }}/sentinel:${{ github.sha }}

  deploy:
    needs: [obfuscation-scan, build-sentinel]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN not set - skipping deploy"
            exit 0
          fi
          git remote add hf https://huggingface.co/spaces/${{ env.HF_SPACE }} || true
          git push --force https://AlexanderGreater90:$HF_TOKEN@huggingface.co/spaces/${{ env.HF_SPACE }} main

  module-deploy:
    runs-on: ubuntu-latest
    needs: [obfuscation-scan]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Set module from input or default
        run: |
          MODULE="${{ github.event.inputs.module }}"
          echo "MODULE=${MODULE:-core}" >> $GITHUB_ENV
      - name: Deploy module via deploy_module.py
        run: |
          chmod +x scripts/deploy_module.py
          python scripts/deploy_module.py "${{ env.MODULE }}"
      - name: Commit compose fragments and logs
        run: |
          git config --global user.name "emerald-automaton"
          git config --global user.email "automaton@emerald.engine"
          git add compose_fragments/ workspace_core/ 2>/dev/null || true
          if ! git diff-index --quiet HEAD; then
            git commit -m "module: deploy ${{ env.MODULE }} tier via deploy_module"
            git push
          else
            echo "No changes to commit"
          fi
      - name: Log deployment result
        run: |
          python scripts/success_tracker.py record "${{ env.MODULE }}" "deploy" "success"
