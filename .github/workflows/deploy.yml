name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://huggingface.co/spaces/AlexanderGreater90/Emerald-Autonomy-Engine || true
          git push --force https://AlexanderGreater90:$HF_TOKEN@huggingface.co/spaces/AlexanderGreater90/Emerald-Autonomy-Engine main
