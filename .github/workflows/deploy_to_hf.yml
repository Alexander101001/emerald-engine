name: Deploy to Hugging Face Spaces
on:
  workflow_call:
  workflow_dispatch:
    inputs:
      target_space:
        description: 'Hugging Face Space name (org/space)'
        required: false
        default: 'AlexanderGreater90/emerald-engine'
      force_build:
        description: 'Force full Docker rebuild'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  HF_SPACE: ${{ github.event.inputs.target_space || 'AlexanderGreater90/emerald-engine' }}
  DOCKER_IMAGE: emerald-engine:latest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up QEMU for multi-arch
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Hugging Face Container Registry
        uses: docker/login-action@v3
        with:
          registry: hf-registry.registry.hf.space
          username: ${{ github.actor }}
          password: ${{ secrets.HF_TOKEN }}

      - name: Log in to GitHub Container Registry (cache)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            hf-registry.registry.hf.space/${{ env.HF_SPACE }}:latest
            hf-registry.registry.hf.space/${{ env.HF_SPACE }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Hugging Face Space rebuild
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          SPACE_ORG="${HF_SPACE%/*}"
          SPACE_NAME="${HF_SPACE#*/}"
          echo "Triggering rebuild for $SPACE_ORG/$SPACE_NAME..."
          curl -s -X POST \
            "https://huggingface.co/api/spaces/$SPACE_ORG/$SPACE_NAME/restart" \
            -H "Authorization: Bearer $HF_TOKEN" \
            -H "Content-Type: application/json"
          echo ""
          echo "Rebuild triggered. Space will restart with new container."

      - name: Verify deployment
        run: |
          echo "Deployment initiated to $HF_SPACE"
          echo "Space URL: https://huggingface.co/spaces/$HF_SPACE"
          echo "Direct app: https://${{ env.HF_SPACE }}.hf.space"
          echo "Health endpoint: https://${{ env.HF_SPACE }}.hf.space/health"

  health-check:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Wait for Space to become healthy
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          SPACE_ORG="${HF_SPACE%/*}"
          SPACE_NAME="${HF_SPACE#*/}"
          API_URL="https://huggingface.co/api/spaces/$SPACE_ORG/$SPACE_NAME"
          echo "Waiting for $SPACE_ORG/$SPACE_NAME to become RUNNING..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s "$API_URL" -H "Authorization: Bearer $HF_TOKEN" | \
              python3 -c "import sys,json; print(json.load(sys.stdin).get('runtime', {}).get('stage', 'unknown'))" 2>/dev/null || echo "unknown")
            echo "Attempt $i/30: status=$STATUS"
            if [ "$STATUS" = "RUNNING" ]; then
              echo "Space is RUNNING!"
              HEALTH=$(curl -sf "https://$SPACE_NAME-$SPACE_ORG.hf.space/health" 2>/dev/null && echo "healthy" || echo "unreachable")
              echo "Health endpoint: $HEALTH"
              exit 0
            fi
            sleep 20
          done
          echo "Timeout waiting for Space to become healthy"
          exit 1
