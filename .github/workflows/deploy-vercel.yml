name: Deploy to Vercel

on:
  push:
    branches: [main]
  schedule:
    - cron: '17 6 * * *'

concurrency:
  group: vercel-deploy
  cancel-in-progress: false

env:
  TMPDIR: /tmp/emerald-vercel
  NODE_OPTIONS: '--max-old-space-size=256'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install
        run: npm ci --omit=dev --ignore-scripts --no-audit --no-fund

      - name: Initialize isolated temp workspace
        run: |
          rm -rf $TMPDIR
          mkdir -p $TMPDIR
          echo "session-$(date +%s)-${{ github.run_id }}" > $TMPDIR/.session
          chmod 700 $TMPDIR

      - name: Decrypt env (secrets only)
        env:
          EMERALD_KEY: ${{ secrets.EMERALD_KEY }}
        run: |
          if [ -n "$EMERALD_KEY" ] && [ -f .env.encrypted ]; then
            node -e "
              const c = await import('./src/security/crypto-config.js');
              c.verifyChecksum('.env.encrypted');
              c.decryptEnvFile('.env.encrypted', process.env.EMERALD_KEY);
            "
            cp .env $TMPDIR/.env
            node -e "
              const { secureWipe } = await import('./src/security/crypto-config.js');
              secureWipe('.env', 2);
            "
            echo "Decrypted and relocated to isolated workspace"
          else
            echo "EMERALD_KEY not configured or no .env.encrypted ‚Äî deploying without secrets"
          fi

      - name: Restore env from isolated workspace
        run: |
          if [ -f $TMPDIR/.env ]; then
            cp $TMPDIR/.env .env
            chmod 600 .env
          fi

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          EMERALD_KEY: ${{ secrets.EMERALD_KEY }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN not set ‚Äî skipping deploy"
            exit 0
          fi
          npx vercel --token=$VERCEL_TOKEN --prod --yes \
            --build-env EMERALD_KEY=$EMERALD_KEY \
            --env TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }} \
            --env OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            --env STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }} \
            --env STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }} \
            --env ADSENSE_CLIENT_ID=${{ secrets.ADSENSE_CLIENT_ID }} \
            --env SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --env SUPABASE_KEY=${{ secrets.SUPABASE_KEY }} \
            --scope=$VERCEL_ORG_ID 2>&1 || echo 'Deploy encountered non-fatal issues'

      - name: Secure wipe all secrets from workspace
        if: always()
        run: |
          node -e "
            const { secureWipe } = await import('./src/security/crypto-config.js');
            ['.env', '.env.local', '.env.production'].forEach(f => {
              try { secureWipe(f, 2); } catch(e) {}
            });
          "
          rm -rf $TMPDIR
          echo "Workspace secrets wiped"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::warning::Vercel deploy failed for ${{ github.sha }}"
